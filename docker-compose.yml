services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_METAMASK_API_KEY: ${NEXT_PUBLIC_METAMASK_API_KEY}
                NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        ports:
            - "3000:3000"
        env_file:
            - .env
        restart: unless-stopped
